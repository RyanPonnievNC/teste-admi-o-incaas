<!-- Container principal de toda a aplicação -->
<div class="app-shell">

  <!-- Barra de navegação no topo -->
  <nav class="app-navbar">

    <!-- Área interna da navbar para alinhar título e links -->
    <div class="app-navbar__content">

      <!-- Título do sistema -->
      <h1 class="app-navbar__title">
        <img src="ChatGPT Image 21 de abr. de 2026, 22_50_50.png" alt="Jurídico Pro App">
      </h1>

      <!-- Grupo de links do menu -->
      <div class="app-navbar__links">

        <!-- Link para a página Dashboard -->
        <!-- routerLink define para qual rota vai -->
        <!-- routerLinkActive aplica a classe quando essa rota estiver ativa -->
        <a
          routerLink="/dashboard"
          routerLinkActive="app-navbar__link--active"
          class="app-navbar__link"
        >
          Dashboard
        </a>

        <!-- Link para a página Processos -->
        <a
          routerLink="/processos"
          routerLinkActive="app-navbar__link--active"
          class="app-navbar__link"
        >
          Processos
        </a>

        <!-- Link para a página Clientes -->
        <a
          routerLink="/clientes"
          routerLinkActive="app-navbar__link--active"
          class="app-navbar__link"
        >
          Clientes
        </a>
      </div>
    </div>
  </nav>

  <!-- Área principal onde as páginas serão exibidas -->
  <main class="app-main">

    <!-- Div usada para aplicar animação de transição entre rotas -->
    <!-- prepareRoute(outlet) pega a rota atual -->
    <!-- [@routeAnimations] ativa a animação criada no app.ts -->
    <div [@routeAnimations]="prepareRoute(outlet)" class="app-page-transition">

      <!-- Local onde o Angular renderiza a página atual -->
      <!-- #outlet cria uma referência do router-outlet -->
      <router-outlet #outlet="outlet"></router-outlet>
    </div>
  </main>
</div>
