<!-- Container principal da aplicação inteira -->
<div class="app-shell">

  <!-- Barra lateral do sistema -->
  <header
    *ngIf="!isLoginPage()"
    class="app-navbar"
  >

    <!-- Conteúdo interno da sidebar -->
    <div class="app-navbar__content">

      <!-- Área do logo/marca do sistema -->
      <div class="app-navbar__brand">

        <!-- Imagem oficial do sistema Jurídico Pro -->
        <div class="app-navbar__title">

          <img
            src="ChatGPT Image 21 de abr. de 2026, 22_50_50.png"
            alt="Jurídico Pro"
            class="app-navbar__logo"
          />

        </div>

      </div>

      <!-- Área dos links principais do menu -->
      <nav class="app-navbar__links">

        <!-- Link para o Dashboard -->
        <a
          routerLink="/dashboard"
          routerLinkActive="app-navbar__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="app-navbar__link"
        >
          Dashboard
        </a>

        <!-- Link para a página de Clientes -->
        <a
          routerLink="/clientes"
          routerLinkActive="app-navbar__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="app-navbar__link"
        >
          Clientes
        </a>

        <!-- Link para Processos aparece apenas para administrador -->
        <a
          *ngIf="ehAdmin()"
          routerLink="/processos"
          routerLinkActive="app-navbar__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="app-navbar__link"
        >
          Processos
        </a>

      </nav>

      <!-- Área inferior da sidebar -->
      <div class="app-navbar__footer">

        <!-- Botão Sair aparece quando o usuário está logado -->
        <button
          *ngIf="estaLogado()"
          type="button"
          class="app-navbar__logout"
          (click)="sair()"
        >
          Sair
        </button>

      </div>

    </div>

  </header>

  <!-- Área principal onde as páginas aparecem -->
  <main
    class="app-main"
    [class.app-main--login]="isLoginPage()"
  >

    <!-- Container responsável pela animação entre páginas -->
    <div
      [@routeAnimations]="prepareRoute(outlet)"
      class="app-page-transition"
    >

      <!-- Aqui o Angular carrega Login, Dashboard, Clientes ou Processos -->
      <router-outlet #outlet="outlet"></router-outlet>

    </div>

  </main>

  <!-- Caixa de mensagem do sistema -->
  <div
    *ngIf="toastVisivel"
    class="app-toast"
    [class.app-toast--success]="toastTipo === 'success'"
    [class.app-toast--info]="toastTipo === 'info'"
  >

    <!-- Ícone da caixa -->
    <div class="app-toast__icon">
      {{ toastTipo === 'success' ? '✅' : '👋' }}
    </div>

    <!-- Conteúdo textual da caixa -->
    <div class="app-toast__content">

      <!-- Título da mensagem -->
      <strong class="app-toast__title">
        {{ toastTitulo }}
      </strong>

      <!-- Descrição da mensagem -->
      <span class="app-toast__message">
        {{ toastMensagem }}
      </span>

    </div>

    <!-- Botão para fechar manualmente a caixa -->
    <button
      type="button"
      class="app-toast__close"
      (click)="fecharToast()"
    >
      ×
    </button>

  </div>

</div>
