<!--
  app.html

  Este é o arquivo principal do layout do sistema.
  Ele controla:
  - a barra lateral esquerda
  - os links de navegação
  - o botão Login/Sair
  - a área onde as páginas aparecem
  - a animação entre páginas
  - a caixa de mensagem de login/logout
-->

<!-- Container principal da aplicação inteira -->
<div class="app-shell">

  <!-- Barra lateral do sistema -->
  <header class="app-navbar">

    <!-- Conteúdo interno da sidebar -->
    <div class="app-navbar__content">

      <!-- Área do logo/marca do sistema -->
      <div class="app-navbar__brand">

        <!-- Ícone jurídico do sistema -->
        <div class="app-navbar__title">
          <img src="ChatGPT Image 21 de abr. de 2026, 22_50_50.png" alt="Jurídico Pro">
        </div>

      </div>

      <!-- Área dos links principais do menu -->
      <nav class="app-navbar__links">

        <!-- Link para o Dashboard -->
        <a
          routerLink="/dashboard"
          routerLinkActive="app-navbar__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="app-navbar__link"
        >
          Dashboard
        </a>

        <!-- Link para a página de Processos -->
        <a
          routerLink="/processos"
          routerLinkActive="app-navbar__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="app-navbar__link"
        >
          Processos
        </a>

        <!-- Link para a página de Clientes -->
        <a
          routerLink="/clientes"
          routerLinkActive="app-navbar__link--active"
          [routerLinkActiveOptions]="{ exact: true }"
          class="app-navbar__link"
        >
          Clientes
        </a>

      </nav>

      <!-- Área inferior da sidebar -->
      <div class="app-navbar__footer">

        <!-- Botão Área de Login aparece quando o usuário NÃO está logado -->
        <button
          *ngIf="!estaLogado()"
          type="button"
          class="app-navbar__login"
          (click)="irParaLogin()"
        >
          Área de Login
        </button>

        <!-- Botão Sair aparece quando o usuário está logado -->
        <button
          *ngIf="estaLogado()"
          type="button"
          class="app-navbar__logout"
          (click)="sair()"
        >
          Sair
        </button>

      </div>

    </div>

  </header>

  <!-- Área principal onde as páginas aparecem -->
  <main class="app-main">

    <!--
      Container responsável pela animação entre páginas.

      [@routeAnimations]:
      ativa a animação criada no app.ts.

      prepareRoute(outlet):
      identifica a rota atual.

      #outlet="outlet":
      cria uma referência ao router-outlet.
    -->
    <div
      [@routeAnimations]="prepareRoute(outlet)"
      class="app-page-transition"
    >

      <!-- Aqui o Angular carrega Dashboard, Processos, Clientes ou Login -->
      <router-outlet #outlet="outlet"></router-outlet>

    </div>

  </main>

  <!-- Caixa de mensagem do sistema -->
  <div
    *ngIf="toastVisivel"
    class="app-toast"
    [class.app-toast--success]="toastTipo === 'success'"
    [class.app-toast--info]="toastTipo === 'info'"
  >

    <!-- Ícone da caixa -->
    <div class="app-toast__icon">
      {{ toastTipo === 'success' ? '✅' : '👋' }}
    </div>

    <!-- Conteúdo textual da caixa -->
    <div class="app-toast__content">

      <!-- Título da mensagem -->
      <strong class="app-toast__title">
        {{ toastTitulo }}
      </strong>

      <!-- Descrição da mensagem -->
      <span class="app-toast__message">
        {{ toastMensagem }}
      </span>

    </div>

    <!-- Botão para fechar manualmente a caixa -->
    <button
      type="button"
      class="app-toast__close"
      (click)="fecharToast()"
    >
      ×
    </button>

  </div>

</div>
