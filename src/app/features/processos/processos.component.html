<form
  [formGroup]="form"
  (ngSubmit)="salvar()"
  class="border p-4 rounded-lg shadow space-y-4 bg-white"
>
  <h2 class="text-xl font-semibold">
    {{ editandoId !== null ? 'Editar Processo' : 'Cadastrar Processo' }}
  </h2>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <div>
      <label class="block mb-2 font-medium">Número</label>
      <input
        type="text"
        formControlName="numero"
        class="w-full border rounded px-3 py-2"
      />
      <p
        *ngIf="form.get('numero')?.touched && form.get('numero')?.invalid"
        class="text-red-500 text-sm mt-1"
      >
        O número do processo é obrigatório.
      </p>
    </div>

    <div>
      <label class="block mb-2 font-medium">Cliente</label>
      <input
        type="text"
        formControlName="cliente"
        class="w-full border rounded px-3 py-2"
      />
      <p
        *ngIf="form.get('cliente')?.touched && form.get('cliente')?.invalid"
        class="text-red-500 text-sm mt-1"
      >
        O nome do cliente é obrigatório.
      </p>
    </div>
  </div>

  <div>
    <label class="block mb-2 font-medium">Descrição</label>
    <textarea
      formControlName="descricao"
      rows="4"
      class="w-full border rounded px-3 py-2"
    ></textarea>
  </div>

  <div>
    <label class="block mb-2 font-medium">Status</label>
    <select
      formControlName="status"
      class="w-full border rounded px-3 py-2"
    >
      <option value="ATIVO">ATIVO</option>
      <option value="FINALIZADO">FINALIZADO</option>
      <option value="SUSPENSO">SUSPENSO</option>
    </select>
  </div>

  <div class="flex gap-2">
    <p-button
      type="submit"
      [label]="editandoId !== null ? 'Atualizar Processo' : 'Salvar Processo'"
    ></p-button>

    <p-button
      *ngIf="editandoId !== null"
      type="button"
      label="Cancelar"
      severity="secondary"
      (onClick)="cancelarEdicao()"
    ></p-button>
  </div>
</form>
