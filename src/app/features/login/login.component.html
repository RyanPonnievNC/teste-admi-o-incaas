<!-- Página inteira do login -->
<main class="login-page">

  <!-- Card branco central da tela de login -->
  <section class="login-card">

    <!-- Área da marca do sistema -->
    <div class="login-card__brand">

      <!-- Caixa do ícone/logo -->
      <div class="login-card__icon">

        <!-- Texto usado como marca visual caso não queira usar imagem de logo -->
        <span class="login-card__icon-text">
          <img
            src="ChatGPT Image 21 de abr. de 2026, 22_50_50.png"
            alt="Jurídico Pro"
            class="app-navbar__logo"
          />
        </span>
      </div>

      <!-- Título principal da tela -->
      <h1 class="login-card__title">Jurídico Pro</h1>

      <!-- Subtítulo exibido quando está no modo login -->
      <p class="login-card__subtitle" *ngIf="!modoCadastroAdmin">
        Entre como administrador ou acesse como visitante.
      </p>

      <!-- Subtítulo exibido quando está no modo cadastro -->
      <p class="login-card__subtitle" *ngIf="modoCadastroAdmin">
        Cadastre uma nova conta administrativa com código de verificação.
      </p>
    </div>

    <!-- Formulário de login do administrador -->
    <form
      class="login-form"
      *ngIf="!modoCadastroAdmin"
      (ngSubmit)="entrarComoAdmin()"
    >

      <!-- Grupo do campo de usuário -->
      <div class="login-form__group">

        <!-- Label do campo usuário -->
        <label class="login-form__label" for="usuario">
          Usuário administrador
        </label>

        <!-- Input onde o usuário digita o nome de administrador -->
        <input
          class="login-form__input"
          id="usuario"
          name="usuario"
          type="text"
          placeholder="Digite seu usuário"
          autocomplete="username"
          [(ngModel)]="usuario"
        />
      </div>

      <!-- Grupo do campo de senha do login -->
      <div class="login-form__group">

        <!-- Label do campo senha -->
        <label class="login-form__label" for="senha">
          Senha
        </label>

        <!-- Área que envolve o input de senha e o botão do olho -->
        <div class="login-form__password-wrapper">

          <!-- Input da senha, que muda entre password e text -->
          <input
            class="login-form__input login-form__input--password"
            id="senha"
            name="senha"
            [type]="senhaLoginVisivel ? 'text' : 'password'"
            placeholder="Digite sua senha"
            autocomplete="current-password"
            [(ngModel)]="senha"
          />

          <!-- Botão para mostrar ou ocultar a senha -->
          <button
            class="login-form__eye-button"
            type="button"
            (click)="alternarVisibilidadeSenhaLogin()"
            [attr.aria-label]="senhaLoginVisivel ? 'Ocultar senha' : 'Mostrar senha'"
          >

            <!-- Imagem do olho que muda entre aberto e fechado -->
            <img
              class="login-form__eye-image"
              [src]="senhaLoginVisivel ? caminhoOlhoAberto : caminhoOlhoFechado"
              [alt]="senhaLoginVisivel ? 'Olho aberto' : 'Olho fechado'"
            />
          </button>
        </div>
      </div>

      <!-- Mensagem de erro do login -->
      <p class="login-form__error" *ngIf="mensagemErro">
        {{ mensagemErro }}
      </p>

      <!-- Mensagem de sucesso do login -->
      <p class="login-form__success" *ngIf="mensagemSucesso">
        {{ mensagemSucesso }}
      </p>

      <!-- Botão para entrar como administrador -->
      <button class="login-form__button" type="submit">
        Entrar como administrador
      </button>

      <!-- Separador visual -->
      <div class="login-form__divider">
        ou
      </div>

      <!-- Botão para entrar como visitante -->
      <button
        class="login-form__visitor-button"
        type="button"
        (click)="entrarComoVisitante()"
      >
        Entrar como visitante
      </button>

      <!-- Botão para abrir o cadastro de administrador -->
      <button
        class="login-form__create-button"
        type="button"
        (click)="abrirCadastroAdmin()"
      >
        Criar conta admin
      </button>
    </form>

    <!-- Formulário de cadastro de administrador -->
    <form
      class="login-form"
      *ngIf="modoCadastroAdmin"
      (ngSubmit)="criarContaAdmin()"
    >

      <!-- Grupo do campo nome -->
      <div class="login-form__group">

        <!-- Label do campo nome -->
        <label class="login-form__label" for="cadastroNome">
          Nome
        </label>

        <!-- Input do nome -->
        <input
          class="login-form__input"
          id="cadastroNome"
          name="cadastroNome"
          type="text"
          placeholder="Digite seu nome"
          autocomplete="given-name"
          [(ngModel)]="cadastroNome"
        />
      </div>

      <!-- Grupo do campo sobrenome -->
      <div class="login-form__group">

        <!-- Label do campo sobrenome -->
        <label class="login-form__label" for="cadastroSobrenome">
          Sobrenome
        </label>

        <!-- Input do sobrenome -->
        <input
          class="login-form__input"
          id="cadastroSobrenome"
          name="cadastroSobrenome"
          type="text"
          placeholder="Digite seu sobrenome"
          autocomplete="family-name"
          [(ngModel)]="cadastroSobrenome"
        />
      </div>

      <!-- Grupo do campo idade -->
      <div class="login-form__group">

        <!-- Label do campo idade -->
        <label class="login-form__label" for="cadastroIdade">
          Idade
        </label>

        <!-- Input da idade -->
        <input
          class="login-form__input"
          id="cadastroIdade"
          name="cadastroIdade"
          type="number"
          placeholder="Digite sua idade"
          autocomplete="off"
          [(ngModel)]="cadastroIdade"
        />
      </div>

      <!-- Grupo do campo CPF -->
      <div class="login-form__group">

        <!-- Label do campo CPF -->
        <label class="login-form__label" for="cadastroCpf">
          CPF
        </label>

        <!-- Input do CPF -->
        <input
          class="login-form__input"
          id="cadastroCpf"
          name="cadastroCpf"
          type="text"
          placeholder="Digite seu CPF"
          autocomplete="off"
          [(ngModel)]="cadastroCpf"
        />
      </div>

      <!-- Grupo do campo usuário -->
      <div class="login-form__group">

        <!-- Label do campo usuário -->
        <label class="login-form__label" for="cadastroUsuario">
          Usuário
        </label>

        <!-- Input do usuário -->
        <input
          class="login-form__input"
          id="cadastroUsuario"
          name="cadastroUsuario"
          type="text"
          placeholder="Crie um usuário"
          autocomplete="username"
          [(ngModel)]="cadastroUsuario"
        />
      </div>

      <!-- Grupo do campo senha do cadastro -->
      <div class="login-form__group">

        <!-- Label do campo senha -->
        <label class="login-form__label" for="cadastroSenha">
          Senha
        </label>

        <!-- Área que envolve a senha do cadastro e o botão do olho -->
        <div class="login-form__password-wrapper">

          <!-- Input da senha do cadastro -->
          <input
            class="login-form__input login-form__input--password"
            id="cadastroSenha"
            name="cadastroSenha"
            [type]="senhaCadastroVisivel ? 'text' : 'password'"
            placeholder="Crie uma senha"
            autocomplete="new-password"
            [(ngModel)]="cadastroSenha"
          />

          <!-- Botão para mostrar ou ocultar a senha do cadastro -->
          <button
            class="login-form__eye-button"
            type="button"
            (click)="alternarVisibilidadeSenhaCadastro()"
            [attr.aria-label]="senhaCadastroVisivel ? 'Ocultar senha' : 'Mostrar senha'"
          >

            <!-- Imagem do olho que muda entre aberto e fechado -->
            <img
              class="login-form__eye-image"
              [src]="senhaCadastroVisivel ? caminhoOlhoAberto : caminhoOlhoFechado"
              [alt]="senhaCadastroVisivel ? 'Olho aberto' : 'Olho fechado'"
            />
          </button>
        </div>
      </div>

      <!-- Grupo do campo código de verificação -->
      <div class="login-form__group">

        <!-- Label do campo código -->
        <label class="login-form__label" for="cadastroCodigoVerificacao">
          Código de verificação
        </label>

        <!-- Área que envolve o código de verificação e o botão do olho -->
        <div class="login-form__password-wrapper">

          <!-- Input do código de verificação, que muda entre password e text -->
          <input
            class="login-form__input login-form__input--password"
            id="cadastroCodigoVerificacao"
            name="cadastroCodigoVerificacao"
            [type]="codigoVerificacaoVisivel ? 'text' : 'password'"
            placeholder="Digite o código de verificação"
            autocomplete="off"
            [(ngModel)]="cadastroCodigoVerificacao"
          />

          <!-- Botão para mostrar ou ocultar o código de verificação -->
          <button
            class="login-form__eye-button"
            type="button"
            (click)="alternarVisibilidadeCodigoVerificacao()"
            [attr.aria-label]="codigoVerificacaoVisivel ? 'Ocultar código de verificação' : 'Mostrar código de verificação'"
          >

            <!-- Imagem do olho que muda entre aberto e fechado -->
            <img
              class="login-form__eye-image"
              [src]="codigoVerificacaoVisivel ? caminhoOlhoAberto : caminhoOlhoFechado"
              [alt]="codigoVerificacaoVisivel ? 'Olho aberto' : 'Olho fechado'"
            />
          </button>
        </div>
      </div>

      <!-- Mensagem de erro do cadastro -->
      <p class="login-form__error" *ngIf="mensagemErro">
        {{ mensagemErro }}
      </p>

      <!-- Mensagem de sucesso do cadastro -->
      <p class="login-form__success" *ngIf="mensagemSucesso">
        {{ mensagemSucesso }}
      </p>

      <!-- Botão para criar conta admin -->
      <button class="login-form__button" type="submit">
        Criar conta admin
      </button>

      <!-- Botão para voltar ao login -->
      <button
        class="login-form__visitor-button"
        type="button"
        (click)="voltarParaLogin()"
      >
        Voltar para login
      </button>
    </form>
  </section>
</main>
